<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nanlung micheal Longtau BYU-Idaho | Week 5 Code along">
    <meta name="author" content="Nanlung Micheal Longtau">
    <title>Basic HTML and CSS Quiz Week 5 Codealong</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Basic HTML and CSS Quiz | Week 5 Codealong</h1>
        </header>

        <form id="quiz-form" >
            
            
            
            <div class="question">
                <label for="q1">1. What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1" placeholder="Type your answer here..." required>
            </div>

            
            
            <div class="question">
                <label for="q2">2. How are id and class attributes selected in CSS?</label>
                <textarea id="q2" name="q2" rows="4" placeholder="Write your explanation here..." required></textarea>
            </div>

            
            <div class="question">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3" required>
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="a">/* This is a comment */</option>
                    <option value="b">// This is a comment</option>
                    <option value="c">&lt;!-- This is a comment --&gt;</option>
                    <option value="d"># This is a comment</option>
                </select>
            </div>

            
            <div class="question">
                <label for="q4">4. What is the bottom margin in this declaration?</label>
                <div class="code-box">
                    margin: 10px 5px 15px;
                </div>
                <input type="number" id="q4" name="q4" placeholder="Enter the value in px" required>
            </div>

            <button type="submit" class="submit-btn">Submit Quiz</button>
        </form>
    </div>
</body>
</html>
